name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ingestion:
    name: ingestion — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true   # mypy is advisory for v0.1 — we'll tighten in v0.2
      - name: Test
        run: pytest -q --cov=quantumlane_ingestion --cov-report=term-missing

  api:
    name: api — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest -q

  compose-validate:
    name: compose — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create minimal .env
        run: cp .env.example .env
      - name: Validate docker-compose syntax
        run: docker compose -f ops/compose/docker-compose.yml --env-file .env config > /dev/null

  sql-lint:
    name: sql — migration sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration naming & ordering
        run: |
          set -e
          cd db/migrations
          ls *.sql | awk -F_ '{
            num=substr($1,1,4);
            if (num != sprintf("%04d", NR)) {
              printf "Migration %s is out of order (expected %04d)\n", $0, NR;
              exit 1;
            }
          }'
          echo "✓ All migrations named and ordered correctly."
